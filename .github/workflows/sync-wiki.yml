name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/learns/**/*.md'
      - 'docs/best-choices/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync learning notes to wiki
        run: |
          # Create wiki directory structure
          mkdir -p wiki/learns
          mkdir -p wiki/best-choices
          mkdir -p wiki/tags

          # Sync learning notes (flatten subdirectories)
          if [ -d "docs/learns" ]; then
            find docs/learns -name "*.md" -type f | while read file; do
              cp "$file" wiki/learns/
            done
          fi

          # Sync best-choices
          if [ -d "docs/best-choices" ]; then
            find docs/best-choices -name "*.md" -type f | while read file; do
              cp "$file" wiki/best-choices/
            done
          fi

      - name: Generate Tag Pages
        run: |
          # 清理临时文件
          rm -f /tmp/doc_tags.txt /tmp/tag_*.txt

          # Process learning notes - 使用进程替代避免子 shell 问题
          if [ -d "docs/learns" ]; then
            while read file; do
              filename=$(basename "$file")
              # Extract tags from YAML frontmatter - 用空格连接而不是换行
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' ' ' | sed 's/^ *//;s/ *$//')
              if [ -n "$tags" ]; then
                # 每个文件写入多行，每行一个 tag
                for tag in $tags; do
                  echo "${filename}|learns|${tag}" >> /tmp/doc_tags.txt
                done
              fi
            done < <(find docs/learns -name "*.md" -type f)
          fi

          # Process best-choices
          if [ -d "docs/best-choices" ]; then
            while read file; do
              filename=$(basename "$file")
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' ' ' | sed 's/^ *//;s/ *$//')
              if [ -n "$tags" ]; then
                for tag in $tags; do
                  echo "${filename}|best-choices|${tag}" >> /tmp/doc_tags.txt
                done
              fi
            done < <(find docs/best-choices -name "*.md" -type f)
          fi

          # Generate tag pages
          if [ -f /tmp/doc_tags.txt ]; then
            # 获取所有唯一标签
            cut -d'|' -f3 /tmp/doc_tags.txt | sort -u | while read tag; do
              if [ -n "$tag" ]; then
                cat > "wiki/tags/${tag}.md" << EOF
          # Tag: ${tag}

          包含标签 **#${tag}** 的所有文档。

          ## 学习笔记

          EOF
                # 添加学习笔记链接
                grep "|learns|${tag}$" /tmp/doc_tags.txt | while IFS='|' read -r doc folder t; do
                  name="${doc%.md}"
                  echo "- [${name}](../learns/${name})" >> "wiki/tags/${tag}.md"
                done

                echo "" >> "wiki/tags/${tag}.md"
                echo "## 最佳实践" >> "wiki/tags/${tag}.md"
                echo "" >> "wiki/tags/${tag}.md"

                # 添加最佳实践链接
                grep "|best-choices|${tag}$" /tmp/doc_tags.txt | while IFS='|' read -r doc folder t; do
                  name="${doc%.md}"
                  echo "- [${name}](../best-choices/${name})" >> "wiki/tags/${tag}.md"
                done
              fi
            done
          fi

          # Generate Tags index page
          cat > wiki/Tags.md << 'EOF'
          # 标签索引

          按标签浏览所有文档。

          ## 所有标签

          EOF

          if [ -f /tmp/doc_tags.txt ]; then
            # 统计每个标签的文档数
            cut -d'|' -f3 /tmp/doc_tags.txt | sort | uniq -c | sort -rn | while read count tag; do
              if [ -n "$tag" ]; then
                echo "- [#${tag}](./tags/${tag}) (${count})" >> wiki/Tags.md
              fi
            done
          fi

          echo "" >> wiki/Tags.md
          echo "---" >> wiki/Tags.md
          echo "*点击标签查看相关文档*" >> wiki/Tags.md

      - name: Generate Home page
        run: |
          cat > wiki/Home.md << EOF
          # Agent Group 知识库 Wiki

          欢迎访问 Agent Group Wiki！本 Wiki 自动同步自 [主仓库](${{ github.server_url }}/${{ github.repository }})。

          ## 标签云

          EOF

          # 从 doc_tags.txt 生成标签表
          if [ -f /tmp/doc_tags.txt ]; then
            echo "按标签浏览文档：" >> wiki/Home.md
            echo "" >> wiki/Home.md
            echo "| 标签 | 文档数 |" >> wiki/Home.md
            echo "|------|--------|" >> wiki/Home.md
            cut -d'|' -f3 /tmp/doc_tags.txt | sort | uniq -c | sort -rn | while read count tag; do
              if [ -n "$tag" ]; then
                echo "| [#${tag}](./tags/${tag}) | ${count} |" >> wiki/Home.md
              fi
            done
          else
            echo "暂无标签" >> wiki/Home.md
          fi

          cat >> wiki/Home.md << 'EOF'

          ## 学习笔记

          EOF

          # Add links to all learning notes (excluding README.md)
          if [ -d "docs/learns" ]; then
            while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' ' ' | sed 's/^ *//;s/ *$//')
              if [ -n "$tags" ]; then
                tag_links=""
                for tag in $tags; do
                  tag_links="${tag_links} [#${tag}](./tags/${tag})"
                done
                echo "- [${name}](./learns/${name})${tag_links}" >> wiki/Home.md
              else
                echo "- [${name}](./learns/${name})" >> wiki/Home.md
              fi
            done < <(find docs/learns -name "*.md" ! -name "README.md" -type f | sort)
          fi

          cat >> wiki/Home.md << 'EOF'

          ## 最佳实践

          EOF

          if [ -d "docs/best-choices" ]; then
            while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              tags=$(sed -n '/^---$/,/^---$/p' "$file" | grep -E '^tags:' | sed 's/tags://' | tr ',' ' ' | sed 's/^ *//;s/ *$//')
              if [ -n "$tags" ]; then
                tag_links=""
                for tag in $tags; do
                  tag_links="${tag_links} [#${tag}](./tags/${tag})"
                done
                echo "- [${name}](./best-choices/${name})${tag_links}" >> wiki/Home.md
              else
                echo "- [${name}](./best-choices/${name})" >> wiki/Home.md
              fi
            done < <(find docs/best-choices -name "*.md" ! -name "README.md" -type f | sort)
          fi

          echo "" >> wiki/Home.md
          echo "---" >> wiki/Home.md
          echo "*最后同步：$(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> wiki/Home.md

      - name: Generate Sidebar
        run: |
          cat > wiki/_Sidebar.md << 'EOF'
          ## 导航

          **[首页](./Home)**
          **[标签索引](./Tags)**

          ### 学习笔记

          EOF

          # 递归处理 learns 目录，过滤 README.md
          process_learns_dir() {
            local dir="$1"
            local indent="$2"
            
            # 获取当前目录下所有子目录（按字母排序）
            find "$dir" -mindepth 1 -maxdepth 1 -type d | sort | while read subdir; do
              local dirname=$(basename "$subdir")
              
              # 检查该目录下是否有非 README 的 md 文件
              local has_content=$(find "$subdir" -name "*.md" ! -name "README.md" -type f | head -1)
              
              if [ -n "$has_content" ]; then
                # 目录标题
                echo "${indent}**${dirname}**" >> wiki/_Sidebar.md
                
                # 该目录下的 md 文件（排除 README）
                find "$subdir" -maxdepth 1 -name "*.md" ! -name "README.md" -type f | sort | while read file; do
                  filename=$(basename "$file")
                  name="${filename%.md}"
                  echo "${indent}- [${name}](./learns/${name})" >> wiki/_Sidebar.md
                done
                
                # 递归处理子目录
                process_learns_dir "$subdir" "${indent}  "
              fi
            done
          }

          if [ -d "docs/learns" ]; then
            process_learns_dir "docs/learns" ""
          fi

          cat >> wiki/_Sidebar.md << 'EOF'

          ### 最佳实践

          EOF

          if [ -d "docs/best-choices" ]; then
            # 只包含非 README 的 md 文件
            find docs/best-choices -maxdepth 1 -name "*.md" ! -name "README.md" -type f | sort | while read file; do
              filename=$(basename "$file")
              name="${filename%.md}"
              echo "- [${name}](./best-choices/${name})" >> wiki/_Sidebar.md
            done
          fi

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync from main repo: $(date -u '+%Y-%m-%d %H:%M')"
          git push origin master || git push origin main
